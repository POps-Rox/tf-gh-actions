name: "📦 Build Actions Image"

on:
  push:
    branches: [main]
    paths:
      - "image/**"
      - "!image/Dockerfile-base"
  pull_request:
    branches: [main]
    paths:
      - "image/**"
      - "!image/Dockerfile-base"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pops-rox/tf-gh-actions

jobs:
  build:
    name: "Build Actions Image"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: image
          file: image/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/POps-Rox/tf-gh-actions
            org.opencontainers.image.description=Terraform GitHub Actions by POps-Rox
